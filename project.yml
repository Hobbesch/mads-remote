# xcodegen-Projektdefinition — die QUELLE DER WAHRHEIT. Das .xcodeproj wird daraus generiert
# (`make gen`) und ist gitignored (kein binäres pbxproj im Repo). Siehe docs/architecture.md §4.
name: mads-remote
options:
  bundleIdPrefix: com.powerblox
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete # NEW-3: strict concurrency von Tag 1
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

targets:
  mads-remote:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    # Lokale Signing-Config (gitignored): DEVELOPMENT_TEAM fürs Geräte-Deployment. Simulator baut
    # ohne Team („Sign to Run Locally"). Kopiere Signing.xcconfig.example → Signing.xcconfig und
    # trag dein Team ein (oder wähle es in Xcode unter „Signing & Capabilities").
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.powerblox.mads-remote
        PRODUCT_NAME: mads-remote
        INFOPLIST_FILE: App/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        CODE_SIGN_STYLE: Automatic

  mads-remoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: mads-remote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.powerblox.mads-remote.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
